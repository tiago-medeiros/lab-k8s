# Gateway API Gateway resource for the platform-lab cluster
# Creates an HTTP listener on port 80 using the envoy-gateway controller
apiVersion: gateway.network.k8s.io/v1
kind: Gateway
metadata:
  name: platform-lab
  namespace: platform-lab
spec:
  gatewayClassName: envoy-gateway
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
---
# HTTPRoute exposing the platform-lab service
apiVersion: gateway.network.k8s.io/v1
kind: HTTPRoute
metadata:
  name: platform-lab
  namespace: platform-lab
spec:
  parentRefs:
    - name: platform-lab
      kind: Gateway
      namespace: platform-lab
  rules:
    - backendRefs:
        - name: platform-lab-service
          kind: Service
          port: 80
